<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#27272A"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Geometric "AS" monogram -->
  <g fill="none" stroke="#FAFAFA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- A shape -->
    <path d="M8 24L16 7L24 24" />
    <line x1="11" y1="18" x2="21" y2="18" />
    <!-- S integrated as a flowing curve connecting to A -->
    <path d="M19 12C21 10 24 11 23 13C22 15 17 15.5 17 18C17 20 20 21 22 19" />
  </g>
  <!-- Sphere dot accent -->
  <circle cx="16" cy="3.5" r="1.2" fill="#FAFAFA" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
